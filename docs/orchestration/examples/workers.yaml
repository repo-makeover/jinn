workers:
  codexSenior:
    provider: openai
    family: openai
    tier: frontier
    capabilities:
      - repo_edit
      - coding
      - refactor
      - validation
    tools:
      - git
      - filesystem
      - shell
    maxConcurrentTasks: 1
    costClass: high
    workspacePolicy: isolated_worktree

  haikuReviewer:
    provider: anthropic
    family: anthropic
    tier: small
    capabilities:
      - code_review
      - checklist_review
      - bug_hunt
    tools:
      - filesystem
    maxConcurrentTasks: 1
    costClass: low
    workspacePolicy: read_only

  localQa:
    provider: ollama
    family: local
    tier: local
    capabilities:
      - validation
      - test_log_triage
      - duplicate_detection
    tools:
      - shell
    maxConcurrentTasks: 4
    costClass: near_zero
    workspacePolicy: shared

