$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://giles.local/schemas/config/giles_ruleset.v1.yaml"
title: "Giles ruleset v1"
type: object
required:
  - schema_version
  - ruleset_version
  - rules
additionalProperties: false
properties:
  schema_version:
    type: string
  ruleset_version:
    type: string
  rules:
    type: array
    minItems: 1
    items:
      type: object
      required:
        - rule_id
        - title
        - description
        - tier
        - severity
        - check_type
        - introduced_in
      additionalProperties: false
      properties:
        rule_id:
          type: string
          pattern: "^[A-Z0-9]+-[0-9]{3}$"
        title:
          type: string
        description:
          type: string
        tier:
          enum:
            - tier_0
            - tier_1
            - tier_2
            - tier_3
        severity:
          enum:
            - info
            - warn
            - fail
        check_type:
          type: string
        autofixable:
          type: boolean
        introduced_in:
          type: string
        deprecated_in:
          type:
            - string
            - "null"
        replaced_by:
          type:
            - string
            - "null"
        applies_to_profiles:
          type: array
          items:
            type: string
