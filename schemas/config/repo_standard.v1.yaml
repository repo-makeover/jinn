$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://giles.local/schemas/config/repo_standard.v1.yaml"
title: "Giles repo standard v1"
type: object
required:
  - schema_version
  - standard_id
  - standard_version
  - profiles
  - required_roots
  - governance_objects
  - rules
additionalProperties: false
properties:
  schema_version:
    type: string
  standard_id:
    const: "repo_standard.v1"
  standard_version:
    type: string
    pattern: "^1\\.0(\\.0)?$"
  required_roots:
    type: array
    minItems: 1
    items:
      type: string
  forbidden_roots:
    type: array
    items:
      type: string
  conditional_roots:
    type: object
    additionalProperties:
      type: object
  governance_objects:
    type: object
    required:
      - required
      - freeze_set
    additionalProperties: false
    properties:
      required:
        type: array
        minItems: 1
        items:
          type: string
      freeze_set:
        type: array
        minItems: 1
        items:
          type: string
  profiles:
    type: object
    minProperties: 1
    additionalProperties:
      type: object
      required:
        - precedence_modes
        - runtime_evidence_window_days
      additionalProperties: false
      properties:
        precedence_modes:
          type: array
          minItems: 1
          items:
            enum:
              - governance_first
              - contract_first
              - code_first
        runtime_evidence_window_days:
          type: integer
          minimum: 1
  precedence_expansions:
    type: object
    additionalProperties:
      type: array
      items:
        type: string
  muninn:
    type: object
    additionalProperties: true
  rules:
    type: object
    required:
      - ruleset_path
      - ruleset_schema_path
    additionalProperties: false
    properties:
      ruleset_path:
        type: string
      ruleset_schema_path:
        type: string
