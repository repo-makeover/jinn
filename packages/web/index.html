    <script>if(typeof crypto!=='undefined'&&!crypto.randomUUID){crypto.randomUUID=function(){return'10000000-1000-4000-8000-100000000000'.replace(/[018]/g,function(c){var r=crypto.getRandomValues(new Uint8Array(1))[0];return(c^(r&(15>>(c/4)))).toString(16)})}}</script>
    <script>(function(){try{var t=localStorage.getItem('jinn-theme')||'dark';if(t==='system'){t=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'}document.documentElement.setAttribute('data-theme',t)}catch(e){}})()</script>
  </head>

    <div id="root"></div>
