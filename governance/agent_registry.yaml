schema_version: "1.0"
registry_mode: "authoritative"
undeclared_agent_surface: "forbidden"
agents:
  - agent_id: "codexImplementer"
    path: "agent_instructions/orchestration/codex-implementer.md"
    purpose: "Frontier implementer worker; fills the seniorImplementer role and edits the repo in an isolated worktree."
  - agent_id: "codexArchitect"
    path: "agent_instructions/orchestration/codex-architect.md"
    purpose: "Read-only frontier architect worker; fills the architect role for architectureChange tasks."
  - agent_id: "claudeReviewer"
    path: "agent_instructions/orchestration/claude-reviewer.md"
    purpose: "Cheap cross-family independent reviewer worker; fills the independentReviewer role."
  - agent_id: "antigravityReviewer"
    path: "agent_instructions/orchestration/antigravity-reviewer.md"
    purpose: "Third-family adversarial reviewer / bug-hunter worker; fills the adversarialReviewer role."
  - agent_id: "localWorker"
    path: "agent_instructions/orchestration/local-worker.md"
    purpose: "Near-zero-cost local worker; fills the qaGate and localTriage roles."
