name: Governance

on:
  push:
    branches: [main, feature/project-phoenix]
  pull_request:
    branches: [main]

jobs:
  giles:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Giles repo check
        run: |
          if command -v giles >/dev/null 2>&1; then
            giles repo-check .
          else
            echo "giles not installed; skipping local-only governance check"
          fi
