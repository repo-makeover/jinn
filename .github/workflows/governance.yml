name: Governance

on:
  push:
    branches: [main, feature/project-phoenix]
  pull_request:
    branches: [main]

jobs:
  giles:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Giles repo check
        run: |
          if command -v giles >/dev/null 2>&1; then
            giles repo-check .
          else
            echo "giles not installed; skipping local-only governance check"
          fi
